<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Usuarios · Panel Admin</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,600&family=Montserrat:wght@300;500;800&display=swap" />
  <link rel="stylesheet" href="/assets/css/admin.css" />
</head>
<body>

<aside class="admin-sidebar">
  <div class="sidebar-brand"><h1>CARNICERÍA</h1><span>PANEL ADMIN</span></div>
  <ul class="sidebar-nav">
    <li><a href="/admin/"><span class="nav-icon">📊</span> DASHBOARD</a></li>
    <li><a href="/admin/productos.html"><span class="nav-icon">🥩</span> PRODUCTOS</a></li>
    <li><a href="/admin/pedidos.html"><span class="nav-icon">📦</span> PEDIDOS</a></li>
    <li><a href="/admin/promociones.html"><span class="nav-icon">🏷️</span> PROMOCIONES</a></li>
    <li id="usersNavItem"><a href="/admin/usuarios.html" class="active"><span class="nav-icon">👥</span> USUARIOS</a></li>
    <li><a href="/"><span class="nav-icon">🌐</span> VER TIENDA</a></li>
  </ul>
  <div class="sidebar-footer">
    <strong class="admin-user-name">—</strong><span>Administrador</span>
    <button class="logout-btn" id="logoutBtn">CERRAR SESIÓN</button>
  </div>
</aside>

<div class="admin-main">
  <div class="admin-topbar">
    <span class="topbar-title">Gestión de Usuarios</span>
    <div class="topbar-actions">
      <button class="btn btn-gold" data-action="open-modal" data-modal="newUserModal">+ NUEVO USUARIO</button>
    </div>
  </div>

  <div class="admin-content">
    <div class="table-card">
      <div class="table-header">
        <h3>TODOS LOS USUARIOS</h3>
      </div>
      <div class="overflow-auto">
        <table class="data-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>NOMBRE</th>
              <th>EMAIL</th>
              <th>ROL</th>
              <th>ESTADO</th>
              <th>PERMISOS</th>
              <th>ACCIONES</th>
            </tr>
          </thead>
          <tbody id="usersTbody">
            <tr><td colspan="7" class="loading-cell">Cargando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Modal nuevo usuario -->
<div class="modal-overlay hidden" id="newUserModal">
  <div class="modal">
    <div class="modal-header">
      <h3>Nuevo Usuario</h3>
      <button class="modal-close">CERRAR</button>
    </div>
    <div class="modal-body">
      <form id="newUserForm">
        <div class="form-grid">
          <div class="form-field span-2">
            <label>Email</label>
            <input type="email" name="email" required placeholder="usuario@ejemplo.com" />
          </div>
          <div class="form-field span-2">
            <label>Contraseña</label>
            <input type="password" name="password" required placeholder="Mínimo 8 caracteres" minlength="8" />
          </div>
          <div class="form-field">
            <label>Nombre</label>
            <input type="text" name="name" placeholder="Nombre completo" />
          </div>
          <div class="form-field">
            <label>Teléfono</label>
            <input type="text" name="phone" placeholder="600 000 000" />
          </div>
          <div class="form-field span-2">
            <label>Rol</label>
            <select name="role" required>
              <option value="cliente">Cliente</option>
              <option value="ventas">Ventas</option>
              <option value="admin">Admin</option>
            </select>
          </div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn-outline-sm btn-cancel modal-close">CANCELAR</button>
          <button type="submit" class="btn btn-gold">CREAR USUARIO</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Modal permisos de ventas -->
<div class="modal-overlay hidden" id="userPermissionsModal">
  <div class="modal">
    <div class="modal-header">
      <h3>Permisos de Ventas</h3>
      <button class="modal-close">CERRAR</button>
    </div>
    <div class="modal-body">
      <form id="userPermissionsForm">
        <div class="form-grid">
          <div class="form-field span-2">
            <label class="toggle-wrap">
              <span class="toggle">
                <input type="checkbox" name="change_order_status" checked />
                <span class="toggle-slider"></span>
              </span>
              Puede cambiar estado de pedidos
            </label>
          </div>
          <div class="form-field span-2">
            <label class="toggle-wrap">
              <span class="toggle">
                <input type="checkbox" name="change_stock" checked />
                <span class="toggle-slider"></span>
              </span>
              Puede modificar stock de productos
            </label>
          </div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn-outline-sm btn-cancel modal-close">CANCELAR</button>
          <button type="submit" class="btn btn-primary">GUARDAR PERMISOS</button>
        </div>
      </form>
    </div>
  </div>
</div>

<div class="toast" id="adminToast" hidden></div>
<script src="/assets/js/auth.js"></script>
<script src="/assets/js/admin.js"></script>
</body>
</html>
