<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar Sesión · Carnicería Artesanal</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,600&family=Montserrat:wght@300;500;800&display=swap" />
  <link rel="stylesheet" href="/assets/css/admin.css" />
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <h2>INICIAR SESIÓN</h2>
    <p class="auth-sub">Accede a tu cuenta de Carnicería Artesanal</p>

    <form class="auth-form" id="loginForm" novalidate>
      <div class="form-field">
        <label for="email">Correo Electrónico</label>
        <input type="email" id="email" required autocomplete="email" placeholder="tu@email.com" />
      </div>
      <div class="form-field">
        <label for="password">Contraseña</label>
        <input type="password" id="password" required autocomplete="current-password" placeholder="••••••••" />
      </div>
      <p class="auth-error" id="loginError"></p>
      <button type="submit" class="btn btn-primary btn-full">
        ENTRAR
      </button>
    </form>

    <div class="auth-links">
      ¿No tienes cuenta? <a href="/registro.html">Regístrate</a>
      &nbsp;·&nbsp;
      <a href="/">Volver a la tienda</a>
    </div>
  </div>
</div>

<script src="/assets/js/auth.js"></script>
<script src="/assets/js/login.js"></script>
</body>
</html>
