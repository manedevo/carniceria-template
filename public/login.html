<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar Sesión · Carnicería Artesanal</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,600&family=Montserrat:wght@300;500;800&display=swap" />
  <link rel="stylesheet" href="/assets/css/admin.css" />
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <h2>INICIAR SESIÓN</h2>
    <p class="auth-sub">Accede a tu cuenta de Carnicería Artesanal</p>

    <form class="auth-form" id="loginForm" novalidate>
      <div class="form-field">
        <label for="email">Correo Electrónico</label>
        <input type="email" id="email" required autocomplete="email" placeholder="tu@email.com" />
      </div>
      <div class="form-field">
        <label for="password">Contraseña</label>
        <input type="password" id="password" required autocomplete="current-password" placeholder="••••••••" />
      </div>
      <p class="auth-error" id="loginError"></p>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">
        ENTRAR
      </button>
    </form>

    <div class="auth-links">
      ¿No tienes cuenta? <a href="/registro.html">Regístrate</a>
      &nbsp;·&nbsp;
      <a href="/">Volver a la tienda</a>
    </div>
  </div>
</div>

<script src="/assets/js/auth.js"></script>
<script>
  'use strict';
  if (Auth.isLoggedIn()) {
    const u = Auth.getUser();
    window.location.href = (u.role === 'admin' || u.role === 'ventas') ? '/admin/' : '/mi-cuenta.html';
  }

  document.getElementById('loginForm').addEventListener('submit', async e => {
    e.preventDefault();
    const errEl = document.getElementById('loginError');
    errEl.textContent = '';
    const btn = e.target.querySelector('button[type=submit]');
    btn.disabled = true;
    btn.textContent = 'ENTRANDO...';

    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    try {
      const res  = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Error al iniciar sesión');

      Auth.setToken(data.token);
      const params = new URLSearchParams(window.location.search);
      const ret    = params.get('return');
      if (ret && ret.startsWith('/') && !ret.startsWith('//')) {
        window.location.href = ret;
      } else if (data.role === 'admin' || data.role === 'ventas') {
        window.location.href = '/admin/';
      } else {
        window.location.href = '/mi-cuenta.html';
      }
    } catch (err) {
      errEl.textContent = err.message;
      btn.disabled = false;
      btn.textContent = 'ENTRAR';
    }
  });
</script>
</body>
</html>
