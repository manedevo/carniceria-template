<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Cuenta · Carnicería Artesanal</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,600&family=Montserrat:wght@300;500;800&display=swap" />
  <link rel="stylesheet" href="/assets/css/main.css" />
</head>
<body>

<header class="madrid-header">
  <div class="container">
    <div class="brand-box">
      <div class="logo"><h1>CARNICERÍA</h1><span>MADRID · DESDE 2026</span></div>
    </div>
    <nav class="nav-links">
      <a href="/#catalogo">EL MERCADO</a>
      <a href="/#pedido">PEDIDOS</a>
      <a href="/#nosotros">HERENCIA</a>
      <a href="/#contacto">UBICACIÓN</a>
    </nav>
    <button class="cart-trigger-header" data-action="go-home">VOLVER</button>
  </div>
</header>

<div class="account-page">
  <div class="account-header">
    <h2>MI CUENTA</h2>
    <p id="welcomeMsg">Cargando...</p>
    <span class="logout-link mt-sm" data-action="logout">
      Cerrar sesión
    </span>
  </div>

  <section>
    <div class="section-heading heading-left">
      <span class="sub">Historial</span>
      <h3 class="title title-sm">MIS PEDIDOS</h3>
      <div class="divider divider-tight"></div>
    </div>
    <ul class="orders-list" id="ordersList">
      <li><div class="empty-state">Cargando tus pedidos...</div></li>
    </ul>
  </section>
</div>

<footer class="footer-legal">
  <p>© <span id="year"></span> CARNICERÍA ARTESANAL · MADRID, ESPAÑA</p>
</footer>

<script src="/assets/js/auth.js"></script>
<script src="/assets/js/mi-cuenta.js"></script>
</body>
</html>
