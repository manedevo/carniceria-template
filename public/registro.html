<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crear Cuenta · Carnicería Artesanal</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,600&family=Montserrat:wght@300;500;800&display=swap" />
  <link rel="stylesheet" href="/assets/css/admin.css" />
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <h2>CREAR CUENTA</h2>
    <p class="auth-sub">Regístrate para hacer seguimiento de tus pedidos</p>

    <form class="auth-form" id="regForm" novalidate>
      <div class="form-field">
        <label for="name">Nombre Completo</label>
        <input type="text" id="name" required autocomplete="name" placeholder="Ej: Alberto García" />
      </div>
      <div class="form-field">
        <label for="email">Correo Electrónico</label>
        <input type="email" id="email" required autocomplete="email" placeholder="tu@email.com" />
      </div>
      <div class="form-field">
        <label for="phone">WhatsApp (opcional)</label>
        <input type="tel" id="phone" autocomplete="tel" placeholder="+34 600 000 000" />
      </div>
      <div class="form-field">
        <label for="password">Contraseña</label>
        <input type="password" id="password" required autocomplete="new-password" placeholder="Mínimo 8 caracteres" />
      </div>
      <p class="auth-error" id="regError"></p>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">
        REGISTRARME
      </button>
    </form>

    <div class="auth-links">
      ¿Ya tienes cuenta? <a href="/login.html">Inicia sesión</a>
      &nbsp;·&nbsp;
      <a href="/">Volver a la tienda</a>
    </div>
  </div>
</div>

<script src="/assets/js/auth.js"></script>
<script>
  'use strict';
  if (Auth.isLoggedIn()) window.location.href = '/mi-cuenta.html';

  document.getElementById('regForm').addEventListener('submit', async e => {
    e.preventDefault();
    const errEl = document.getElementById('regError');
    errEl.textContent = '';
    const btn = e.target.querySelector('button[type=submit]');
    btn.disabled = true;
    btn.textContent = 'CREANDO CUENTA...';

    const name     = document.getElementById('name').value.trim();
    const email    = document.getElementById('email').value.trim();
    const phone    = document.getElementById('phone').value.trim();
    const password = document.getElementById('password').value;

    try {
      const res  = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, phone: phone || undefined, password }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Error al registrarse');

      Auth.setToken(data.token);
      window.location.href = '/mi-cuenta.html';
    } catch (err) {
      errEl.textContent = err.message;
      btn.disabled = false;
      btn.textContent = 'REGISTRARME';
    }
  });
</script>
</body>
</html>
